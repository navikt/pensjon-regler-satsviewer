apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: "pensjon-regler-satsviewer"
  namespace: "pensjon-regler"
  labels:
    team: "pensjon-regler"
  annotations:
    nais.io/read-only-file-system: "false"
spec:
  image: "{{ image }}"
  port: 8080
  replicas:
    min: 2
    max: 2
  liveness:
    path: "/index.html"
    initialDelay: 40
    timeout: 3
  readiness:
    path: "/index.html"
    initialDelay: 40
    timeout: 3
  resources:
    limits:
      cpu: "1"
      memory: "2048Mi"
    requests:
      cpu: "100m"
      memory: "512Mi"
  env:
    - name: GITHUB_APP_ID
      value: "{{ github_app_id }}"
    - name: GITHUB_APP_PRIVATE_KEY
      value: "{{ github_app_private_key }}"
  accessPolicy:
    outbound:
      external:
        - host: api.github.com
      rules:
        - application: pensjon-regler
  ingresses:
    - "https://pensjon-regler-satsviewer.intern.nav.no"