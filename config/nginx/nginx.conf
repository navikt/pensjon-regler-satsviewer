server {
    listen 8080;
    resolver kube-dns.kube-system.svc.cluster.local valid=30s;

    # Proxy til GitHub API — token-placeholder byttes ut av entrypoint.sh ved oppstart
    location /github-api/ {
        proxy_pass https://api.github.com/;
        proxy_set_header Host api.github.com;
        proxy_set_header Authorization "token GITHUB_APP_TOKEN_PLACEHOLDER";
        proxy_set_header Accept "application/vnd.github.v3+json";
        proxy_set_header User-Agent "pensjon-regler-satsviewer";
        proxy_ssl_server_name on;
    }

    location /aktivTabell {
        set $upstream http://pensjon-regler.pensjon-regler.svc.cluster.local;
        proxy_pass $upstream$request_uri;
    }

    location /alleSatstabeller {
        set $upstream http://pensjon-regler.pensjon-regler.svc.cluster.local;
        proxy_pass $upstream$request_uri;
    }

    location /api/ {
        set $upstream http://pensjon-regler.pensjon-regler.svc.cluster.local;
        proxy_pass $upstream$request_uri;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }
}